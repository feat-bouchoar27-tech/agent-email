<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent IA — Gestion des Emails</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #F5F4F0; color: #1a1a1a; min-height: 100vh; }
.sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #1a1a1a; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 8px; }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
.logo-icon { width: 36px; height: 36px; background: #378ADD; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.logo-text { font-size: 15px; font-weight: 600; color: #fff; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; color: #888; font-size: 14px; cursor: pointer; transition: all 0.15s; }
.nav-item:hover, .nav-item.active { background: #2a2a2a; color: #fff; }
.nav-item span { font-size: 18px; }
.main { margin-left: 220px; padding: 2rem; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
.page-title { font-size: 22px; font-weight: 600; }
.btn { display: flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; transition: all 0.15s; font-weight: 500; }
.btn-primary { background: #1a1a1a; color: #fff; }
.btn-primary:hover { background: #333; }
.btn-outline { background: #fff; color: #1a1a1a; border: 1px solid #ddd; }
.btn-outline:hover { background: #f0f0f0; }
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 2rem; }
.metric { background: #fff; border-radius: 12px; padding: 1.25rem; border: 1px solid #eee; }
.metric-label { font-size: 12px; color: #888; margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.metric-value { font-size: 32px; font-weight: 600; }
.metric-value.red { color: #E24B4A; }
.metric-value.amber { color: #BA7517; }
.metric-value.green { color: #3B6D11; }
.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 2rem; }
.card { background: #fff; border-radius: 12px; padding: 1.5rem; border: 1px solid #eee; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 1.25rem; color: #1a1a1a; }
.bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.bar-label { font-size: 12px; color: #666; width: 100px; text-align: right; }
.bar-track { flex: 1; height: 10px; background: #f0f0f0; border-radius: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; transition: width 0.8s cubic-bezier(.4,0,.2,1); }
.bar-num { font-size: 12px; color: #888; width: 20px; font-family: 'DM Mono', monospace; }
.filters { display: flex; gap: 12px; margin-bottom: 1.5rem; }
select { padding: 10px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-size: 14px; font-family: 'DM Sans', sans-serif; color: #1a1a1a; cursor: pointer; }
.email-list { display: flex; flex-direction: column; gap: 8px; }
.email-card { background: #fff; border-radius: 12px; border: 1px solid #eee; overflow: hidden; transition: box-shadow 0.15s; }
.email-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.email-header { display: flex; align-items: center; gap: 14px; padding: 14px 18px; cursor: pointer; }
.urgence-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.ub-haute { background: #FCEBEB; color: #A32D2D; }
.ub-moyenne { background: #FAEEDA; color: #854F0B; }
.ub-faible { background: #EAF3DE; color: #3B6D11; }
.email-info { flex: 1; min-width: 0; }
.email-sujet { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.email-meta { font-size: 12px; color: #888; margin-top: 3px; }
.cat-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; background: #E6F1FB; color: #185FA5; }
.chevron { font-size: 18px; color: #aaa; transition: transform 0.2s; }
.chevron.open { transform: rotate(180deg); }
.email-body { display: none; padding: 0 18px 18px; border-top: 1px solid #f0f0f0; }
.email-body.open { display: block; }
.detail-grid { display: grid; grid-template-columns: 130px 1fr; gap: 6px 12px; margin: 12px 0; font-size: 13px; }
.dl { color: #888; }
.dv { color: #1a1a1a; }
.reponse-box { background: #F5F4F0; border-radius: 8px; padding: 14px; font-size: 13px; line-height: 1.7; color: #333; margin-top: 8px; border-left: 3px solid #378ADD; }
.reponse-label { font-size: 12px; font-weight: 600; color: #378ADD; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 12px; margin-bottom: 6px; }
.empty { text-align: center; padding: 4rem; color: #aaa; }
.loading { text-align: center; padding: 2rem; color: #888; font-size: 14px; }
.list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.list-count { font-size: 14px; color: #888; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">📧</div>
    <div class="logo-text">Agent IA</div>
  </div>
  <div class="nav-item active"><span>📊</span> Dashboard</div>
  <div class="nav-item"><span>📬</span> Emails</div>
  <div class="nav-item"><span>🚨</span> Urgences</div>
  <div class="nav-item"><span>⚙️</span> Paramètres</div>
</div>

<div class="main">
  <div class="topbar">
    <div class="page-title">Tableau de bord</div>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-outline" onclick="analyser()">🔄 Analyser</button>
      <button class="btn btn-primary" onclick="charger()">↻ Actualiser</button>
    </div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">Total emails</div><div class="metric-value" id="m-total">—</div></div>
    <div class="metric"><div class="metric-label">Urgences hautes</div><div class="metric-value red" id="m-haute">—</div></div>
    <div class="metric"><div class="metric-label">Urgences moyennes</div><div class="metric-value amber" id="m-moyenne">—</div></div>
    <div class="metric"><div class="metric-label">Non traités</div><div class="metric-value green" id="m-nt">—</div></div>
  </div>

  <div class="charts">
    <div class="card"><div class="card-title">Emails par catégorie</div><div id="chart-cat"></div></div>
    <div class="card"><div class="card-title">Emails par urgence</div><div id="chart-urg"></div></div>
  </div>

  <div class="filters">
    <select onchange="filtrer()" id="f-cat">
      <option value="">Toutes les catégories</option>
      <option>recouvrement</option><option>RH</option><option>fournisseur</option>
      <option>direction</option><option>banque</option><option>client</option><option>comptabilite</option>
    </select>
    <select onchange="filtrer()" id="f-urg">
      <option value="">Toutes les urgences</option>
      <option>haute</option><option>moyenne</option><option>faible</option>
    </select>
  </div>

  <div class="list-header">
    <div class="card-title">Liste des emails</div>
    <div class="list-count" id="list-count"></div>
  </div>
  <div class="email-list" id="email-list"><div class="loading">Chargement...</div></div>
</div>

<script>
let allEmails = [];
const CAT_COLORS = { recouvrement:'#E24B4A', RH:'#378ADD', fournisseur:'#1D9E75', direction:'#7F77DD', banque:'#BA7517', client:'#D4537E', comptabilite:'#639922', autre:'#888780' };
const URG_COLORS = { haute:'#E24B4A', moyenne:'#EF9F27', faible:'#639922' };

async function charger() {
  try {
    const r = await fetch('http://127.0.0.1:5000/emails');
    allEmails = await r.json();
    if (!Array.isArray(allEmails)) throw new Error();
    mettreAJour();
  } catch(e) {
    document.getElementById('email-list').innerHTML = '<div class="empty">⚠️ API non disponible — lance python api.py</div>';
  }
}

async function analyser() {
  const btn = document.querySelector('.btn-outline');
  btn.textContent = '⏳ Analyse...';
  btn.disabled = true;
  try {
    await fetch('http://127.0.0.1:5000/analyser', { method: 'POST' });
    await charger();
  } catch(e) {}
  btn.textContent = '🔄 Analyser';
  btn.disabled = false;
}

function mettreAJour() {
  document.getElementById('m-total').textContent = allEmails.length;
  document.getElementById('m-haute').textContent = allEmails.filter(e => e.urgence === 'haute').length;
  document.getElementById('m-moyenne').textContent = allEmails.filter(e => e.urgence === 'moyenne').length;
  document.getElementById('m-nt').textContent = allEmails.filter(e => !e.traite).length;
  dessinerCharts();
  filtrer();
}

function dessinerCharts() {
  const cats = {}, urgs = { haute:0, moyenne:0, faible:0 };
  allEmails.forEach(e => {
    cats[e.categorie] = (cats[e.categorie]||0) + 1;
    if (urgs[e.urgence] !== undefined) urgs[e.urgence]++;
  });
  const maxC = Math.max(...Object.values(cats), 1);
  const maxU = Math.max(...Object.values(urgs), 1);

  document.getElementById('chart-cat').innerHTML = Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([c,n]) =>
    `<div class="bar-row"><div class="bar-label">${c}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxC*100)}%;background:${CAT_COLORS[c]||'#888'}"></div></div><div class="bar-num">${n}</div></div>`
  ).join('');

  document.getElementById('chart-urg').innerHTML = Object.entries(urgs).map(([u,n]) =>
    `<div class="bar-row"><div class="bar-label">${u}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxU*100)}%;background:${URG_COLORS[u]}"></div></div><div class="bar-num">${n}</div></div>`
  ).join('');
}

function filtrer() {
  const cat = document.getElementById('f-cat').value;
  const urg = document.getElementById('f-urg').value;
  const emails = allEmails.filter(e => (!cat || e.categorie === cat) && (!urg || e.urgence === urg));
  document.getElementById('list-count').textContent = `${emails.length} email(s)`;

  if (!emails.length) {
    document.getElementById('email-list').innerHTML = '<div class="empty">Aucun email trouvé</div>';
    return;
  }

  document.getElementById('email-list').innerHTML = emails.map((e, i) => `
    <div class="email-card">
      <div class="email-header" onclick="toggle(${i})">
        <span class="urgence-badge ub-${e.urgence}">${e.urgence}</span>
        <div class="email-info">
          <div class="email-sujet">${e.sujet || '(sans sujet)'}</div>
          <div class="email-meta">${e.expediteur} · ${e.date_reception ? new Date(e.date_reception).toLocaleDateString('fr-FR', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : ''}</div>
        </div>
        <span class="cat-badge">${e.categorie}</span>
        <span class="chevron" id="chev-${i}">⌄</span>
      </div>
      <div class="email-body" id="body-${i}">
        <div class="detail-grid">
          <div class="dl">Résumé IA</div><div class="dv">${e.resume || '—'}</div>
          <div class="dl">Action</div><div class="dv">${e.type_action || '—'}</div>
          <div class="dl">Statut</div><div class="dv">${e.traite ? '✅ Traité' : '⏳ En attente'}</div>
        </div>
        ${e.reponse_proposee ? `<div class="reponse-label">Réponse proposée par l'IA</div><div class="reponse-box">${e.reponse_proposee}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function toggle(i) {
  document.getElementById(`body-${i}`).classList.toggle('open');
  const c = document.getElementById(`chev-${i}`);
  c.classList.toggle('open');
}

charger();
setInterval(charger, 30000);
</script>
</body>
</html>
